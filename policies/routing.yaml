# Router policy. cost-first is the default mode and is only enabled here
# because results/routing/parity.json (generated by
# benchmarks/replay/routing_eval.py against the 500-prompt labeled
# dataset) shows >=90% judge-scored parity between routed-down answers
# and the large-tier model on eligible traffic. See CLAUDE.md rule 4 --
# no routing policy ships without that evidence file existing first.

default_mode: cost-first  # cost-first | quality-first

tiers:
  small:
    chain: small
    max_complexity: 0.28
  mid:
    chain: mid
    max_complexity: 0.55
  large:
    chain: large
    max_complexity: 1.01

# Calibrated against benchmarks/replay/routing_dataset.jsonl -- see
# benchmarks/replay/routing_eval.py and results/routing/parity_mock.json.
# reasoning_signal is weighted higher than code_signal alone because a
# prompt tripping BOTH (e.g. "explain this traceback") is what actually
# separates "debugging" (large) from "write me a function" (mid).
complexity_weights:
  length_words: 0.30
  code_signal: 0.15
  reasoning_signal: 0.40
  conversation_depth: 0.05
  max_tokens_requested: 0.10

length_words_norm: 40
max_tokens_norm: 1024
